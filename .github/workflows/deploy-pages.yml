name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "**"

  # Manueller Trigger über GitHub UI
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein paralleler Deploy gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Blog-Ordner als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
